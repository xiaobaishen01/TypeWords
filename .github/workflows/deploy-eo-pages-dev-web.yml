name: Deploy to EoPages Dev Web

on:
  push:
    branches: [ 'dev' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-path: dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to EoPages
        run: pnpm why unplugin-vue-better-define && pnpm run build-dev-web
        env:
          EO_PAGES_TOKEN: ${{ secrets.EO_PAGES_TOKEN }}
